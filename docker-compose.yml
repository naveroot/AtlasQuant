# TimeWeb Cloud Apps (Docker Compose) — see https://timeweb.cloud/docs/apps/deploying-with-docker-compose
# Host ports 80/443 are reserved; first service is proxied to the app domain.
# Use managed PostgreSQL (TimeWeb DBaaS). Create primary + _cache/_queue/_cable databases
# (or set all *_DATABASE_URL vars in the Apps UI — see docs/plans/-2.md).
services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: ${DATABASE_URL}
      CACHE_DATABASE_URL: ${CACHE_DATABASE_URL}
      QUEUE_DATABASE_URL: ${QUEUE_DATABASE_URL}
      CABLE_DATABASE_URL: ${CABLE_DATABASE_URL}
      DB_HOST: ${DB_HOST}
      ATLAS_QUANT_DATABASE_PASSWORD: ${ATLAS_QUANT_DATABASE_PASSWORD}
      SOLID_QUEUE_IN_PUMA: "true"
      KAMAL_PROXY_SSL: "true"
