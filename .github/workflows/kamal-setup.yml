# One-time Kamal bootstrap for TimeWeb VPS (proxy, registry, PostgreSQL accessory).
# Run manually from GitHub Actions after configuring secrets/variables.
name: Kamal Setup

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
      RAILS_ENV: production
      BUNDLE_WITHOUT: "development:test"
      BUNDLE_WITH: tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Kamal deploy targets
        env:
          TWC_VPS_HOST: ${{ vars.TWC_VPS_HOST }}
          TWC_APP_HOST: ${{ vars.TWC_APP_HOST }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$TWC_VPS_HOST" ]; then
            echo "TWC_VPS_HOST repository variable is required." >&2
            exit 1
          fi
          sed -i "s|__TWC_VPS_HOST__|${TWC_VPS_HOST}|g" config/deploy.yml
          sed -i "s|__GITHUB_OWNER__|${GITHUB_OWNER}|g" config/deploy.yml

      - name: Set up SSH for Kamal
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.KAMAL_SSH_PRIVATE_KEY }}
          TWC_VPS_HOST: ${{ vars.TWC_VPS_HOST }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "SSH_PRIVATE_KEY secret is empty — add SSH_PRIVATE_KEY or KAMAL_SSH_PRIVATE_KEY matching the VPS authorized_keys." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keyscan -H "$TWC_VPS_HOST" >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=15 "root@${TWC_VPS_HOST}" "echo SSH OK"

      - name: Use CI Kamal secrets file
        run: cp .kamal/secrets.cd .kamal/secrets

      - name: Bootstrap server with Kamal
        run: bin/kamal setup
        env:
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          ATLAS_QUANT_DATABASE_PASSWORD: ${{ secrets.ATLAS_QUANT_DATABASE_PASSWORD }}

      - name: Register AtlasQuant in Plane Caddy
        if: vars.TWC_APP_HOST != ''
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.KAMAL_SSH_PRIVATE_KEY }}
          TWC_VPS_HOST: ${{ vars.TWC_VPS_HOST }}
          TWC_APP_HOST: ${{ vars.TWC_APP_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keyscan -H "$TWC_VPS_HOST" >> ~/.ssh/known_hosts
          scp -r deploy/plane-shared "root@${TWC_VPS_HOST}:/tmp/atlasquant-plane-shared"
          ssh "root@${TWC_VPS_HOST}" \
            "ATLAS_APP_HOST=${TWC_APP_HOST} bash /tmp/atlasquant-plane-shared/install.sh"
