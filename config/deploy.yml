# Name of your application. Used to uniquely configure containers.
service: atlas_quant

# ghcr.io image; __GITHUB_OWNER__ replaced in CI before deploy.
image: ghcr.io/__GITHUB_OWNER__/atlas_quant

# Deploy to TimeWeb VPS; __TWC_VPS_HOST__ replaced in CI from GitHub variable TWC_VPS_HOST.
servers:
  web:
    - __TWC_VPS_HOST__

# Kamal proxy + Let's Encrypt; __TWC_APP_HOST__ replaced from GitHub variable TWC_APP_HOST.
proxy:
  ssl: true
  host: __TWC_APP_HOST__

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - ATLAS_QUANT_DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: atlas_quant-db
    KAMAL_PROXY_SSL: "true"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "atlas_quant_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  cache:
    type: gha
    options: mode=max
    image: app-build-cache

accessories:
  db:
    image: postgres:16
    host: __TWC_VPS_HOST__
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: atlas_quant
      secret:
        - POSTGRES_PASSWORD
    directories:
      - db_data:/var/lib/postgresql/data
