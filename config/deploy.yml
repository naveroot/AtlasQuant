# Name of your application. Used to uniquely configure containers.
service: atlas_quant

# Image on ghcr.io (registry.server below); __GITHUB_OWNER__ replaced in CI.
image: __GITHUB_OWNER__/atlas_quant

# Deploy to TimeWeb VPS (shared with Plane); __TWC_VPS_HOST__ replaced in CI.
# Plane Caddy owns :80/:443 — app listens on localhost:8080 (see deploy/plane-shared/).
ssh:
  user: root

servers:
  web:
    hosts:
      - __TWC_VPS_HOST__
    proxy: false
    options:
      publish:
        - "127.0.0.1:8080:80"

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - ATLAS_QUANT_DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: atlas_quant-db
    KAMAL_PROXY_SSL: "true"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "atlas_quant_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  cache:
    type: gha
    options: mode=max
    image: app-build-cache

accessories:
  db:
    image: postgres:16
    host: __TWC_VPS_HOST__
    port: "127.0.0.1:5433:5432"
    env:
      clear:
        POSTGRES_USER: atlas_quant
      secret:
        - POSTGRES_PASSWORD
    directories:
      - db_data:/var/lib/postgresql/data
