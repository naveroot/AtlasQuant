# SWE Grounding — Gate 2: сверка plan с кодовой базой перед Implement
# Запуск: после Spec Review (status: active)

"SWE Grounding":
  icon: "🧭"
  menu: buttons
  mode: SC:Architect
  systemPrompt:
    command: 'cat AGENTS.md'
  prompt: |
    Ты Grounding agent для AtlasQuant.

    Контекст задачи:
    $prompt

    Прочитай active spec/plan в `docs/specs/` и `docs/plans/`.
    Если status не `active` — выведи `GATE_2: BLOCKED (spec not active)` и остановись.

    Сверь Implementation Plan с текущей кодовой базой:
    1. Существующие файлы, которые plan затронет
    2. Конфликты с AGENTS.md (MVP scope, stack)
    3. Нереалистичные шаги или missing dependencies
    4. Feasibility: можно ли выполнить plan минимальным diff

    Обнови `.agent-run/active-context.md` (если есть) рабочими фактами.

    **Если grounding OK:**
    - Запиши `GATE_2: PASS` в `.agent-run/gate-2.result`
    - Выведи `GATE_2: PASS`
    - Список файлов для изменения
    - Первый checkbox для Implement

    **Если проблемы:**
    - Запиши `GATE_2: FAIL` (или `GATE_2: BLOCKED`) в `.agent-run/gate-2.result`
    - Выведи `GATE_2: FAIL`
    - Конкретные конфликты
    - Рекомендации: правки plan (→ Architect) или уточнение spec
  instantRun: true

"SWE Grounding Loop":
  icon: "🔄"
  menu: buttons
  actions:
    - name: "🧭 Grounding Check"
      actions:
        - "SWE Grounding"

    - name: "🔍 Evaluate Gate 2"
      prompt:
        command: 'bash .supercode/workflows/atlasquant/scripts/check-gate-2.sh'

    - name: "✓ Gate 2 Passed"
      if:
        type: shell
        value: 'echo "$prompt" | grep -q "GATE_2: PASS"'
      systemPrompt:
        command: 'bash .supercode/workflows/atlasquant/scripts/plane-mcp-context.sh transition implement "Gate 2 PASS → Implement"'
      prompt: |
        Gate 2 passed. Синхронизируй Plane через MCP:
        1. `update_work_item` → state implement
        2. `create_work_item_comment`

        Выведи: Grounding OK. Proceed to Implement.
      instantRun: true

    - name: "❌ Grounding Failed"
      if:
        type: shell
        value: 'echo "$prompt" | grep -q "GATE_2: FAIL"'
      actions:
        - name: "🚫 Plane → Blocked (MCP)"
          systemPrompt:
            command: 'bash .supercode/workflows/atlasquant/scripts/plane-mcp-context.sh transition blocked "Gate 2 FAIL/BLOCKED"'
          prompt: |
            Grounding failed. Через Plane MCP переведи задачу в blocked и добавь комментарий.
          instantRun: true
        - name: "🏗️ Revise Plan"
          actions:
            - "SWE Architect"
        - "SWE Grounding Loop"
