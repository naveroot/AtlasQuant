# SWE Spec Conformance — Gate 4: diff vs active spec AC
# Запуск: после CI pass, перед финальным PR summary

"SWE Spec Conformance":
  icon: "🎯"
  menu: buttons
  systemPrompt:
    command: 'bash .supercode/workflows/atlasquant/scripts/plane-pages-context.sh base && cat AGENTS.md docs/plane-pages/README.md'
  prompt: |
    Ты Spec Conformance Reviewer для AtlasQuant.

    $prompt

    Прочитай active spec из **Plane Pages** и текущий diff.

    Для каждого AC из spec:
    - [ ] Реализован? (файл/тест как evidence)
    - [ ] Out-of-scope не затронут?

    Обнови `.agent-run/verification-loop.md` если есть.

    **Если все AC закрыты:**
    - Запиши `GATE_4: PASS` в `.agent-run/gate-4.result`
    - Выведи `GATE_4: PASS`
    - Evidence table: AC → file/test

    **Если gaps:**
    - Запиши `GATE_4: FAIL` в `.agent-run/gate-4.result`
    - Выведи `GATE_4: FAIL`
    - Список незакрытых AC
    - Минимальные правки (Implement), не менять spec без причины
  instantRun: true

"SWE Spec Conformance Loop":
  icon: "🎯"
  menu: buttons
  actions:
    - name: "🎯 Check AC Coverage"
      actions:
        - "SWE Spec Conformance"

    - name: "🔍 Evaluate Gate 4"
      prompt:
        command: 'bash .supercode/workflows/atlasquant/scripts/check-gate-4.sh'

    - name: "✓ All AC Met"
      if:
        type: shell
        value: 'echo "$prompt" | grep -q "GATE_4: PASS"'
      systemPrompt:
        command: 'bash .supercode/workflows/atlasquant/scripts/plane-mcp-context.sh transition review "Gate 4 PASS → Review"'
      prompt: |
        Gate 4 passed. Синхронизируй Plane через MCP → state review + comment.

        Выведи: Spec conformance OK. Write PR summary with evidence table.
      instantRun: true

    - name: "❌ Close AC Gaps"
      if:
        type: shell
        value: 'echo "$prompt" | grep -q "GATE_4: FAIL"'
      actions:
        - name: "🚫 Plane → Blocked (MCP)"
          systemPrompt:
            command: 'bash .supercode/workflows/atlasquant/scripts/plane-mcp-context.sh transition blocked "Gate 4 FAIL"'
          prompt: |
            Gate 4 failed. Через Plane MCP: blocked + comment.
          instantRun: true
        - name: "⚙️ Implement Missing AC"
          actions:
            - "SWE Implement"
        - "SWE Spec Conformance Loop"
