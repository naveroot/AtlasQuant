# SWE Spec Conformance — Gate 4: diff vs active spec AC
# Запуск: после CI pass, перед финальным PR summary

"SWE Spec Conformance":
  icon: "🎯"
  menu: buttons
  systemPrompt:
    command: 'cat AGENTS.md docs/specs/README.md'
  prompt: |
    Ты Spec Conformance Reviewer для AtlasQuant.

    $prompt

    Прочитай active spec в `docs/specs/` и текущий diff.

    Для каждого AC из spec:
    - [ ] Реализован? (файл/тест как evidence)
    - [ ] Out-of-scope не затронут?

    Обнови `.agent-run/verification-loop.md` если есть.

    **Если все AC закрыты:**
    - Выведи `GATE_4: PASS`
    - Evidence table: AC → file/test

    **Если gaps:**
    - Выведи `GATE_4: FAIL`
    - Список незакрытых AC
    - Минимальные правки (Implement), не менять spec без причины
  instantRun: true

"SWE Spec Conformance Loop":
  icon: "🎯"
  menu: buttons
  actions:
    - name: "🎯 Check AC Coverage"
      actions:
        - "SWE Spec Conformance"

    - name: "✓ All AC Met"
      if:
        type: shell
        value: 'echo "$prompt" | grep -q "GATE_4: PASS"'
      prompt:
        command: 'bash .supercode/workflows/atlasquant/scripts/update-plane-state.sh review "Gate 4 PASS → Review" 2>&1 || true; echo "Spec conformance OK. Write PR summary with evidence table."'

    - name: "❌ Close AC Gaps"
      if:
        type: js
        value: 'prompt.includes("GATE_4: FAIL")'
      actions:
        - name: "🚫 Plane → Blocked"
          prompt:
            command: 'bash .supercode/workflows/atlasquant/scripts/update-plane-state.sh blocked "Gate 4 FAIL" 2>&1 || true'
        - name: "⚙️ Implement Missing AC"
          actions:
            - "SWE Implement"
        - "SWE Spec Conformance Loop"
